# Gera SVG claro + escuro (svg-only, sem Docker). v3 exige GITHUB_TOKEN para a API do calendário.
name: Generate snake animation

on:
  schedule:
    - cron: "25 4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "assets/**"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Generate SVGs
        uses: Platane/snk/svg-only@v3
        env:
          GITHUB_TOKEN: ${{ secrets.SNAKE_TOKEN }}
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Declaração XML UTF-8 (Firefox / leitores XML strict)
        run: |
          python3 << 'PY'
          from pathlib import Path
          for name in (
              "dist/github-contribution-grid-snake.svg",
              "dist/github-contribution-grid-snake-dark.svg",
          ):
              p = Path(name)
              if not p.is_file():
                  continue
              data = p.read_bytes()
              if data.startswith(b"\xef\xbb\xbf"):
                  data = data[3:]
              data = data.lstrip()
              if not data.startswith(b"<?xml"):
                  data = b'<?xml version="1.0" encoding="UTF-8"?>\n' + data
              p.write_bytes(data)
          PY

      - name: Copy to assets, remover GIF placeholder e push
        run: |
          mkdir -p assets
          cp -f dist/github-contribution-grid-snake.svg assets/
          cp -f dist/github-contribution-grid-snake-dark.svg assets/
          git rm -f --ignore-unmatch assets/github-contribution-grid-snake.gif
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-contribution-grid-snake.svg assets/github-contribution-grid-snake-dark.svg
          git add -u assets/
          if git diff --staged --quiet; then
            echo "Sem alterações."
          else
            git commit -m "chore(bot): atualizar cobrinha (SVG claro + escuro)"
            git push
          fi
