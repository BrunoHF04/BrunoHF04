# Gera a animação a partir do grid público de contribuições e grava em assets/ na branch main.
# Não usa branch "output" — evita imagem partida antes da primeira execução bem-sucedida.
name: Generate snake animation

on:
  schedule:
    - cron: "25 4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "assets/**"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Generate SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Copy to assets and push
        run: |
          mkdir -p assets
          cp -f dist/github-contribution-grid-snake.svg assets/
          cp -f dist/github-contribution-grid-snake-dark.svg assets/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-contribution-grid-snake.svg assets/github-contribution-grid-snake-dark.svg
          if git diff --staged --quiet; then
            echo "Sem alterações nos SVG."
          else
            git commit -m "chore(bot): atualizar SVG da cobrinha"
            git push
          fi
